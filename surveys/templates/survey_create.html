{% extends "base.html" %}

{% block content %}
<div class="">
    <h1 class="mt-5">Страница создания опроса</h1>
    {% for field in form %}
    <div class="form-group">
        {% if field.errors %}
        <div class="alert alert-danger" role="alert">
            {{ field.errors }}
        </div>
        {% endif %}
    </div>
    {% endfor %}
    <div class="container">
        <form action="" class="form-signin" method="post">
            <div class="form-group">
                {% csrf_token %}
                <div class="h4">Настройки опроса</div>
                <hr>
                {% for input in form %}
                <div class="form-group">
                    <label for="{{ input.id_for_label }}">{{ input.label }}</label>
                    {{ input }}
                </div>
                {% endfor %}
                <button type="submit" class="btn btn-lg btn-primary btn-block">Сохранить настройки</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
